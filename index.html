<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumys AI — Твой путь к работе</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-modal" class="modal">
        <div class="modal-content glass">
            <h2>Расскажи о себе 🤖</h2>
            <input type="text" id="user-name" placeholder="Твое имя">
            <input type="text" id="user-phone" placeholder="Твой телефон">
            <input type="text" id="user-tg" placeholder="Твой Telegram (@username)">
            <input type="text" id="user-district" placeholder="Твой район (например: 14 мкр)">
            <textarea id="user-skills" placeholder="Что ты умеешь?"></textarea>
            <button onclick="saveProfile()" class="apply-btn">Найти работу</button>
        </div>
    </div>

    <h1>Jumys AI</h1>
    <div class="jobs-container"></div>
    <script src="script.js"></script>
</body>
</html>
